<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light" id="html-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatinhos API & Tema Dinâmico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
<!--
    colocado aqui por causa da serialização do HTML e Js
    o atributo defer em uma tag <script> indica ao navegador 
    que ele deve baixar o arquivo JavaScript em paralelo 
    ao carregamento do HTML (serialização), mas executar apenas depois 
    que todo o documento HTML tiver sido analisado --parseado -->
    <script src="./js/script.js" defer></script>  
</head>
<body class="bg-body-tertiary text-body">

    <header class="p-3 mb-4 border-bottom bg-body shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0">Geardor de Gatinhos</h1>
            <!-- trocando por ID e tirando o evento onclick -->
            <button class="btn btn-outline-secondary" id="btn-tema">
                Modo Escuro
            </button>
        </div>
    </header>

    <main class="container text-center">
        <p class="lead">Clique no botão abaixo para buscar gatinhos fofos diretamente da API!</p>
        <!-- trocando por ID e tirando o evento onclick -->
        <button class="btn btn-primary btn-lg mb-4" id="btn-buscar">
            Buscar Gatinhos
        </button>

        <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center" id="container-cards">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
